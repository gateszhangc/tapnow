name: Build And Release

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tapnow-release-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: tapnow
  BUILD_NAMESPACE: build-jobs
  DEPLOY_NAMESPACE: tapnow-prod
  IMAGE_NAME: ghcr.io/gateszhangc/tapnow
  GITOPS_REPO: gateszhangc/tapnow-gitops
  GITOPS_PATH: apps/tapnow/overlays/prod
  ARGOCD_APP_NAME: tapnow-prod

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run browser tests
        run: npm run test:ci

  build-in-cluster:
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Derive image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBE_CONFIG_DATA" | base64 --decode > "$HOME/.kube/config"

      - name: Create build namespace
        run: kubectl create namespace "$BUILD_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

      - name: Create build job secrets
        env:
          BUILD_JOB_GIT_TOKEN: ${{ secrets.BUILD_JOB_GIT_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        run: |
          kubectl -n "$BUILD_NAMESPACE" create secret generic tapnow-build-git-auth \
            --from-literal=token="$BUILD_JOB_GIT_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

          mkdir -p /tmp/tapnow-ghcr
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          Path("/tmp/tapnow-ghcr/config.json").write_text(
              json.dumps(
                  {
                      "auths": {
                          "ghcr.io": {
                              "username": os.environ["GHCR_USERNAME"],
                              "password": os.environ["GHCR_TOKEN"],
                          }
                      }
                  }
              )
          )
          PY

          kubectl -n "$BUILD_NAMESPACE" create secret generic tapnow-build-ghcr \
            --from-file=config.json=/tmp/tapnow-ghcr/config.json \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Render build job manifest
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          template = Path("deploy/build-job.yaml").read_text()
          replacements = {
              "__BUILD_NAMESPACE__": os.environ["BUILD_NAMESPACE"],
              "__GIT_SHA__": os.environ["GITHUB_SHA"],
              "__IMAGE_NAME__": os.environ["IMAGE_NAME"],
              "__IMAGE_TAG__": os.environ["IMAGE_TAG"],
              "__JOB_NAME__": f"tapnow-build-{os.environ['IMAGE_TAG']}",
              "__REPOSITORY__": os.environ["GITHUB_REPOSITORY"],
          }

          for key, value in replacements.items():
              template = template.replace(key, value)

          Path("build-job.rendered.yaml").write_text(template)
          PY

      - name: Start cluster build job
        run: |
          kubectl -n "$BUILD_NAMESPACE" delete job "tapnow-build-${{ steps.meta.outputs.image_tag }}" --ignore-not-found
          kubectl apply -f build-job.rendered.yaml

      - name: Wait for build job
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          if ! kubectl -n "$BUILD_NAMESPACE" wait --for=condition=complete --timeout=30m "job/tapnow-build-${IMAGE_TAG}"; then
            kubectl -n "$BUILD_NAMESPACE" logs "job/tapnow-build-${IMAGE_TAG}" --all-containers=true || true
            exit 1
          fi
          kubectl -n "$BUILD_NAMESPACE" logs "job/tapnow-build-${IMAGE_TAG}" --all-containers=true

  update-gitops:
    if: github.event_name != 'pull_request'
    needs: build-in-cluster
    runs-on: ubuntu-latest
    steps:
      - name: Check out GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}
          path: tapnow-gitops

      - name: Update production image tag
        env:
          IMAGE_TAG: ${{ needs.build-in-cluster.outputs.image_tag }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("tapnow-gitops") / os.environ["GITOPS_PATH"] / "kustomization.yaml"
          content = path.read_text()
          updated, count = re.subn(r"(newTag:\s*).*$", rf"\1{os.environ['IMAGE_TAG']}", content, count=1)
          if count != 1:
              raise SystemExit(f"Expected exactly one newTag entry in {path}.")
          path.write_text(updated)
          PY

      - name: Commit GitOps release
        env:
          IMAGE_TAG: ${{ needs.build-in-cluster.outputs.image_tag }}
        run: |
          cd tapnow-gitops
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$GITOPS_PATH/kustomization.yaml"
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: release tapnow ${IMAGE_TAG}"
          git push origin HEAD:main
