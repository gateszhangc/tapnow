apiVersion: apps/v1
kind: Deployment
metadata:
  name: tapnow
  labels:
    app.kubernetes.io/name: tapnow
    app.kubernetes.io/part-of: tapnow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tapnow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tapnow
        app.kubernetes.io/part-of: tapnow
    spec:
      volumes:
        - name: workspace
          emptyDir: {}
      initContainers:
        - name: checkout
          image: alpine/git:latest
          env:
            - name: APP_REPOSITORY
              value: https://github.com/gateszhangc/tapnow.git
            - name: APP_REVISION
              value: main
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -eu
              git clone "${APP_REPOSITORY}" /workspace
              cd /workspace
              git fetch origin "${APP_REVISION}" --depth=1
              git checkout "${APP_REVISION}"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      containers:
        - name: tapnow
          image: node:20-alpine
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
          command:
            - node
            - server.js
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: HOSTNAME
              value: 0.0.0.0
            - name: PORT
              value: "3000"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: workspace
              mountPath: /workspace
