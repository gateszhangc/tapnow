apiVersion: apps/v1
kind: Deployment
metadata:
  name: tapnow
  labels:
    app.kubernetes.io/name: tapnow
    app.kubernetes.io/part-of: tapnow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tapnow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tapnow
        app.kubernetes.io/part-of: tapnow
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: tapnow
          image: ghcr.io/gateszhangc/tapnow:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: HOSTNAME
              value: 0.0.0.0
            - name: PORT
              value: "3000"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
