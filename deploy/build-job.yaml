apiVersion: batch/v1
kind: Job
metadata:
  name: __JOB_NAME__
  namespace: __BUILD_NAMESPACE__
  labels:
    app.kubernetes.io/name: tapnow-build
    app.kubernetes.io/part-of: tapnow
spec:
  ttlSecondsAfterFinished: 900
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tapnow-build
        app.kubernetes.io/part-of: tapnow
    spec:
      restartPolicy: Never
      volumes:
        - name: workspace
          emptyDir: {}
        - name: docker-config
          secret:
            secretName: tapnow-build-ghcr
      initContainers:
        - name: checkout
          image: alpine/git:2.47.0
          env:
            - name: REPOSITORY
              value: "__REPOSITORY__"
            - name: GIT_SHA
              value: "__GIT_SHA__"
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tapnow-build-git-auth
                  key: token
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -eu
              git clone "https://x-access-token:${GIT_TOKEN}@github.com/${REPOSITORY}.git" /workspace
              cd /workspace
              git fetch origin "${GIT_SHA}" --depth=1
              git checkout "${GIT_SHA}"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      containers:
        - name: kaniko
          image: gcr.io/kaniko-project/executor:v1.23.2-debug
          args:
            - --context=dir:///workspace
            - --dockerfile=/workspace/Dockerfile
            - --destination=__IMAGE_NAME__:__IMAGE_TAG__
            - --cache=true
            - --cache-repo=__IMAGE_NAME__-cache
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: docker-config
              mountPath: /kaniko/.docker
